<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wecull — Safe videos, curated by parents</title>
  <meta name="description" content="Wecull lets parents share YouTube and TikTok videos to a safe, curated feed — so kids can watch the good stuff without downloading the apps." />
  <link rel="icon" type="image/png" href="APP-ICON.png" />
  <meta property="og:title" content="Wecull — Safe videos, curated by parents" />
  <meta property="og:description" content="Parents share YouTube and TikTok videos to a safe feed kids can watch — without the apps." />
  <meta property="og:image" content="APP-ICON.png" />
  <style>
    :root {
      --grad: linear-gradient(135deg, #f0136b 0%, #9b27d4 35%, #2d7bf0 65%, #18ccce 100%);
      --bg: #ffffff;
      --fg: #14161c;
      --muted: #687485;
      --border: #e7eaee;
      --card: #f6f7f9;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0c0e13; --fg: #eef0f4; --muted: #9aa4b2; --border: #1f242e; --card: #141923; }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex; flex-direction: column;
      min-height: 100%;
    }
    /* soft brand glow behind hero */
    .glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(420px 420px at 50% 32%, rgba(155,39,212,0.16), transparent 70%),
        radial-gradient(520px 520px at 70% 60%, rgba(45,123,240,0.12), transparent 70%);
    }
    main {
      position: relative; z-index: 1;
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
      padding: 64px 22px;
    }

    /* App icon tile */
    .tile {
      width: 132px; height: 132px;
      border-radius: 30px;
      background: var(--grad);
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(45, 60, 120, 0.28), 0 0 0 1px rgba(255,255,255,0.06) inset;
      animation: rise 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }
    .tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
    @keyframes rise { from { opacity: 0; transform: translateY(14px) scale(0.96); } }

    h1 {
      margin: 26px 0 6px;
      font-size: 2.6rem;
      letter-spacing: -0.03em;
      background: var(--grad);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
    }
    .tagline {
      margin: 0 auto;
      max-width: 30rem;
      color: var(--muted);
      font-size: 1.12rem;
    }

    .badges {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      margin: 30px 0 10px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 12px 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--fg);
      text-decoration: none;
      font-weight: 600;
      opacity: 0.62; cursor: default;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }
    .badge small { display: block; font-size: 0.62rem; font-weight: 500; color: var(--muted); letter-spacing: 0.02em; }
    .badge svg { width: 22px; height: 22px; flex: none; }
    .soon-pill {
      display: inline-block;
      margin-top: 18px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: #fff;
      background: var(--grad);
    }

    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 26px 22px 40px;
      color: var(--muted);
      font-size: 0.88rem;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--fg); text-decoration: underline; }
    footer .sep { margin: 0 8px; opacity: 0.5; }

    @media (max-width: 520px) {
      h1 { font-size: 2.1rem; }
      .tile { width: 112px; height: 112px; border-radius: 26px; }
      .tile svg { width: 72px; height: 72px; }
    }
  </style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>

  <main>
    <div class="tile" aria-label="Wecull app icon">
      <svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wecull app icon" style="display:block">
        <defs>
          <linearGradient id="wgrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="100" y2="100">
            <stop offset="0" stop-color="#f0136b"/>
            <stop offset="0.35" stop-color="#9b27d4"/>
            <stop offset="0.65" stop-color="#2d7bf0"/>
            <stop offset="1" stop-color="#18ccce"/>
          </linearGradient>
        </defs>
        <rect width="100" height="100" fill="url(#wgrad)"/>
        <g fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 42 L34 71 L48 44" stroke="#ffffff" stroke-width="15"/>
          <path d="M45 52 L57 71 L84 30" stroke="url(#wgrad)" stroke-width="24"/>
          <path d="M45 52 L57 71 L84 30" stroke="#ffffff" stroke-width="15"/>
        </g>
      </svg>
    </div>

    <h1>Wecull</h1>

    <p class="tagline">
      Parents share YouTube and TikTok videos to a safe, curated feed — so kids
      can watch the good stuff without ever downloading the apps.
    </p>

    <div class="badges">
      <span class="badge" title="Coming soon">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.57-.12 0-.23-.02-.3-.03-.01-.06-.04-.22-.04-.39 0-1.15.572-2.27 1.206-2.98.804-.94 2.142-1.64 3.248-1.68.03.13.05.28.05.43zm4.565 15.71c-.03.07-.463 1.58-1.518 3.12-.945 1.34-1.94 2.71-3.43 2.71-1.517 0-1.9-.88-3.63-.88-1.698 0-2.302.91-3.67.91-1.377 0-2.332-1.26-3.428-2.8-1.287-1.82-2.323-4.63-2.323-7.28 0-4.28 2.797-6.55 5.552-6.55 1.448 0 2.675.95 3.6.95.865 0 2.222-1.01 3.902-1.01.613 0 2.886.06 4.374 2.19-.13.09-2.383 1.37-2.383 4.19 0 3.26 2.854 4.42 2.955 4.45z"/></svg>
        <span style="text-align:left">App Store<small>Coming soon</small></span>
      </span>
      <span class="badge" title="Coming soon">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 3.3c-.3.2-.5.6-.5 1.1v15.2c0 .5.2.9.5 1.1l8.2-8.7L4 3.3zm9.3 7.7l2.4-2.5L6 3.1c-.3-.2-.6-.2-.9-.1l8.2 8zM18.6 9.7l-2.6-1.5-2.7 2.8 2.7 2.8 2.7-1.5c.8-.5.8-1.6-.1-2.6zm-5.3 1.3L5 19.9c.3.1.6.1.9-.1l9.7-5.6-2.3-2.2z"/></svg>
        <span style="text-align:left">Google Play<small>Coming soon</small></span>
      </span>
    </div>

    <span class="soon-pill">Launching soon</span>
  </main>

  <footer>
    <a href="/privacy">Privacy Policy</a>
    <span class="sep">·</span>
    <a href="/terms">Terms of Service</a>
    <span class="sep">·</span>
    <a href="https://ashbuildsit.com">ashbuildsit.com</a>
  </footer>
</body>
</html>
